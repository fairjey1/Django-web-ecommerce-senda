{% extends 'core/base.html' %}
{% block content %}
<main>
    <h2>Recuperar Contraseña</h2>
    <p>Ingresa tu correo electrónico y te enviaremos un enlace para que puedas establecer una nueva contraseña.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar enlace de recuperación</button>
    </form>
</main>
{% endblock %}
